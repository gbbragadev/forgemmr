<!doctype html>
<!-- Story CTA 1080×1920 — params: ?hook=&sub=&cta=&badge= · área central livre pro link sticker -->
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0b0614;--ink:#f5f0ff;--muted:#a89bc0;--primary:#ff4d9a;--primary-2:#c44dff;--cyan:#22d3ee}
  *{box-sizing:border-box;margin:0}
  html,body{width:1080px;height:1920px;overflow:hidden}
  body{
    font-family:"Outfit",sans-serif;color:var(--ink);position:relative;text-align:center;
    background:
      radial-gradient(1400px 900px at 50% -10%, #3b1260 0%, transparent 55%),
      radial-gradient(1100px 700px at 100% 100%, #5a1040 0%, transparent 50%),
      var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:150px 90px 170px; /* topo/rodapé seguros (UI do IG) */
  }
  body::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(to bottom,transparent 0 5px,rgba(255,255,255,.03) 5px 7px)}
  .brand{display:flex;align-items:center;gap:16px;font-family:"Bebas Neue";font-size:52px;letter-spacing:.22em;
    background:linear-gradient(90deg,var(--cyan),var(--primary-2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand svg{width:34px;height:34px}
  .badge{font-family:"IBM Plex Mono";font-size:28px;letter-spacing:.16em;color:var(--cyan);
    border:2px solid rgba(34,211,238,.5);border-radius:12px;padding:16px 32px;background:rgba(34,211,238,.09)}
  h1{font-family:"Bebas Neue";font-weight:400;font-size:170px;line-height:.95;max-width:9ch;
    background:linear-gradient(90deg,#fff,#ffb7d5 45%,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:46px;font-weight:500;line-height:1.4;color:var(--muted);max-width:20ch}
  .sticker{
    width:640px;height:250px;border:5px dashed rgba(34,211,238,.55);border-radius:32px;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;
    font-family:"IBM Plex Mono";font-size:30px;letter-spacing:.1em;color:var(--cyan);
  }
  .sticker small{font-size:22px;color:var(--muted)}
  .cta{font-family:"Bebas Neue";font-size:64px;letter-spacing:.06em;color:#fff;
    background:linear-gradient(90deg,var(--primary),var(--primary-2));border-radius:22px;padding:28px 56px 20px;
    box-shadow:0 14px 60px rgba(255,77,154,.4)}
  .seal{font-family:"IBM Plex Mono";font-size:26px;color:var(--muted);letter-spacing:.06em}
</style>
</head>
<body>
  <span class="brand">
    <svg viewBox="0 0 24 24"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#c44dff"/></linearGradient></defs>
      <path d="M12 1 L23 12 L12 23 L1 12 Z" fill="url(#g)"/></svg>
    ARCANA
  </span>
  <span class="badge" id="badge">EP. 01 · QUIZ DE ARQUÉTIPO</span>
  <h1 id="hook">DESCOBRE SEU ARQUÉTIPO</h1>
  <p class="sub" id="sub">Responde 8 cenas e printa teu card. Qual sai pra você?</p>
  <div class="sticker"><span>⬆ LINK STICKER AQUI</span><small>arraste o sticker de link por cima</small></div>
  <span class="cta" id="cta">JOGA AGORA ▸</span>
  <span class="seal">by @otaku_sincero69</span>
<script>
  var q=new URLSearchParams(location.search);
  ["hook","sub","cta","badge"].forEach(function(k){
    if(q.get(k)) document.getElementById(k).textContent=q.get(k);
  });
</script>
</body>
</html>
