name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run lint --workspaces --if-present
      # os testes do engine fazem git commit reais nos repos de app — o runner precisa de identidade
      - run: |
          git config --global user.email "ci@forge.local"
          git config --global user.name "Forge CI"
      - run: npm test

  ai-memory-upstream:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/ai-memory
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: integrations/ai-memory
      - run: cargo test --workspace --locked
