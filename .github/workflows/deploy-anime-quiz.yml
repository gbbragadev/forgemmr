name: Deploy AnimeQuiz (GitHub Pages)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-anime-quiz
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          # project site: https://<user>.github.io/anime-forge/
          PAGES_BASE_PATH: /anime-forge
        run: npm run build:quiz

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/anime-quiz/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
